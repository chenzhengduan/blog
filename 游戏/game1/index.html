<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间轴滑块 - Time-Branch Slider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .info-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .energy-bar {
            width: 100%;
            height: 25px;
            background: #ddd;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 8px;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        .game-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .board-section {
            flex: 1;
            min-width: 400px;
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-gap: 10px;
            margin-bottom: 20px;
            aspect-ratio: 1;
        }

        .tile {
            background: #cdc1b4;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
        }

        .tile.tile-2 { background: #eee4da; color: #776e65; }
        .tile.tile-4 { background: #ede0c8; color: #776e65; }
        .tile.tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile.tile-16 { background: #f59563; color: #f9f6f2; }
        .tile.tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile.tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile.tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.2em; }
        .tile.tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.2em; }
        .tile.tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.2em; }
        .tile.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1em; }
        .tile.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1em; }
        .tile.tile-large { background: #3c3a32; color: #f9f6f2; font-size: 0.9em; }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 250px;
            margin: 0 auto 20px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-up {
            grid-column: 2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-left {
            grid-column: 1;
            grid-row: 2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-down {
            grid-column: 2;
            grid-row: 2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-right {
            grid-column: 3;
            grid-row: 2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 12px 25px;
            background: #f59e0b;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-action:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .timeline-section {
            flex: 1;
            min-width: 300px;
        }

        .timeline-header {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .timeline-tree {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .timeline-node {
            margin: 10px 0;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .timeline-node:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .timeline-node.current {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .timeline-node.dead-end {
            opacity: 0.6;
            border-left-color: #ef4444;
        }

        .node-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .node-step {
            font-weight: bold;
            color: #667eea;
        }

        .node-score {
            color: #f59e0b;
            font-weight: bold;
        }

        .node-action {
            color: #666;
            font-size: 0.9em;
        }

        .child-nodes {
            margin-left: 20px;
            border-left: 2px dashed #ddd;
            padding-left: 10px;
        }

        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }

        .modal-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal-stats {
            margin: 20px 0;
            font-size: 1.2em;
        }

        .modal-stat {
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .game-content {
                flex-direction: column;
            }

            .board-section,
            .timeline-section {
                min-width: 100%;
            }

            h1 {
                font-size: 1.8em;
            }

            .tile {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>时间轴滑块</h1>
            <p class="subtitle">探索不同的未来，找到最优的时间线</p>
        </div>

        <div class="game-info">
            <div class="info-box">
                <div class="info-label">当前分数</div>
                <div class="info-value" id="current-score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">最高分数</div>
                <div class="info-value" id="best-score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">步数</div>
                <div class="info-value" id="steps">0</div>
            </div>
            <div class="info-box" style="min-width: 200px;">
                <div class="info-label">时间能量</div>
                <div class="energy-bar">
                    <div class="energy-fill" id="energy-fill">
                        <span id="energy-text">100</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="game-content">
            <div class="board-section">
                <div class="game-board" id="game-board"></div>

                <div class="controls">
                    <button class="btn btn-up" onclick="game.move('up')">↑</button>
                    <button class="btn btn-left" onclick="game.move('left')">←</button>
                    <button class="btn btn-down" onclick="game.move('down')">↓</button>
                    <button class="btn btn-right" onclick="game.move('right')">→</button>
                </div>

                <div class="action-buttons">
                    <button class="btn-action" onclick="game.newGame()">新游戏</button>
                    <button class="btn-action" id="time-travel-btn" onclick="game.showTimeTravel()" disabled>时间回溯 (-10能量)</button>
                </div>
            </div>

            <div class="timeline-section">
                <div class="timeline-header">时间轴</div>
                <div class="timeline-tree" id="timeline-tree"></div>
            </div>
        </div>
    </div>

    <div class="game-over-modal" id="game-over-modal">
        <div class="modal-content">
            <div class="modal-title">游戏结束</div>
            <div class="modal-stats">
                <div class="modal-stat">最终分数: <strong id="final-score">0</strong></div>
                <div class="modal-stat">最高分数: <strong id="final-best-score">0</strong></div>
                <div class="modal-stat">总步数: <strong id="final-steps">0</strong></div>
                <div class="modal-stat">时间分支数: <strong id="final-branches">0</strong></div>
            </div>
            <button class="btn-action" onclick="game.newGame()">再玩一局</button>
        </div>
    </div>

    <script>
        class TimeNode {
            constructor(board, score, steps, action = null, parent = null) {
                this.id = Date.now() + Math.random();
                this.board = board.map(row => [...row]); // 深拷贝棋盘
                this.score = score;
                this.steps = steps;
                this.action = action; // 到达此节点的操作
                this.parent = parent;
                this.children = [];
                this.isDeadEnd = false;
            }

            addChild(child) {
                this.children.push(child);
            }
        }

        class TimeBranchSlider {
            constructor() {
                this.size = 8;
                this.board = [];
                this.score = 0;
                this.steps = 0;
                this.energy = 100;
                this.maxEnergy = 100;
                this.energyCostPerTravel = 10;

                // 时间树
                this.rootNode = null;
                this.currentNode = null;
                this.allNodes = [];

                this.init();
            }

            init() {
                this.board = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.steps = 0;
                this.energy = this.maxEnergy;

                // 创建根节点
                this.addInitialTiles();
                this.rootNode = new TimeNode(this.board, this.score, this.steps);
                this.currentNode = this.rootNode;
                this.allNodes = [this.rootNode];

                this.render();
                this.renderTimeline();
            }

            addInitialTiles() {
                this.addRandomTile();
                this.addRandomTile();
            }

            addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 0) {
                            emptyCells.push({ x: i, y: j });
                        }
                    }
                }

                if (emptyCells.length > 0) {
                    const { x, y } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.board[x][y] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            move(direction) {
                const oldBoard = this.board.map(row => [...row]);
                const oldScore = this.score;
                let moved = false;

                switch (direction) {
                    case 'left':
                        moved = this.moveLeft();
                        break;
                    case 'right':
                        moved = this.moveRight();
                        break;
                    case 'up':
                        moved = this.moveUp();
                        break;
                    case 'down':
                        moved = this.moveDown();
                        break;
                }

                if (moved) {
                    this.addRandomTile();
                    this.steps++;

                    // 创建新的时间节点
                    const newNode = new TimeNode(this.board, this.score, this.steps, direction, this.currentNode);
                    this.currentNode.addChild(newNode);
                    this.currentNode = newNode;
                    this.allNodes.push(newNode);

                    // 根据分数增长恢复能量
                    const scoreGain = this.score - oldScore;
                    if (scoreGain >= 128) {
                        this.energy = Math.min(this.maxEnergy, this.energy + 5);
                    }

                    this.render();
                    this.renderTimeline();

                    if (this.isGameOver()) {
                        this.currentNode.isDeadEnd = true;
                        this.checkAllTimelinesEnded();
                    }
                }
            }

            moveLeft() {
                let moved = false;
                for (let i = 0; i < this.size; i++) {
                    const row = this.board[i].filter(cell => cell !== 0);
                    const merged = [];

                    for (let j = 0; j < row.length; j++) {
                        if (j < row.length - 1 && row[j] === row[j + 1] && !merged[j] && !merged[j + 1]) {
                            row[j] *= 2;
                            this.score += row[j];
                            row.splice(j + 1, 1);
                            merged[j] = true;
                        }
                    }

                    while (row.length < this.size) {
                        row.push(0);
                    }

                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] !== row[j]) {
                            moved = true;
                        }
                        this.board[i][j] = row[j];
                    }
                }
                return moved;
            }

            moveRight() {
                let moved = false;
                for (let i = 0; i < this.size; i++) {
                    const row = this.board[i].filter(cell => cell !== 0);
                    const merged = [];

                    for (let j = row.length - 1; j >= 0; j--) {
                        if (j > 0 && row[j] === row[j - 1] && !merged[j] && !merged[j - 1]) {
                            row[j] *= 2;
                            this.score += row[j];
                            row.splice(j - 1, 1);
                            merged[j] = true;
                            j--;
                        }
                    }

                    while (row.length < this.size) {
                        row.unshift(0);
                    }

                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] !== row[j]) {
                            moved = true;
                        }
                        this.board[i][j] = row[j];
                    }
                }
                return moved;
            }

            moveUp() {
                let moved = false;
                for (let j = 0; j < this.size; j++) {
                    const col = [];
                    for (let i = 0; i < this.size; i++) {
                        if (this.board[i][j] !== 0) {
                            col.push(this.board[i][j]);
                        }
                    }

                    const merged = [];
                    for (let i = 0; i < col.length; i++) {
                        if (i < col.length - 1 && col[i] === col[i + 1] && !merged[i] && !merged[i + 1]) {
                            col[i] *= 2;
                            this.score += col[i];
                            col.splice(i + 1, 1);
                            merged[i] = true;
                        }
                    }

                    while (col.length < this.size) {
                        col.push(0);
                    }

                    for (let i = 0; i < this.size; i++) {
                        if (this.board[i][j] !== col[i]) {
                            moved = true;
                        }
                        this.board[i][j] = col[i];
                    }
                }
                return moved;
            }

            moveDown() {
                let moved = false;
                for (let j = 0; j < this.size; j++) {
                    const col = [];
                    for (let i = 0; i < this.size; i++) {
                        if (this.board[i][j] !== 0) {
                            col.push(this.board[i][j]);
                        }
                    }

                    const merged = [];
                    for (let i = col.length - 1; i >= 0; i--) {
                        if (i > 0 && col[i] === col[i - 1] && !merged[i] && !merged[i - 1]) {
                            col[i] *= 2;
                            this.score += col[i];
                            col.splice(i - 1, 1);
                            merged[i] = true;
                            i--;
                        }
                    }

                    while (col.length < this.size) {
                        col.unshift(0);
                    }

                    for (let i = 0; i < this.size; i++) {
                        if (this.board[i][j] !== col[i]) {
                            moved = true;
                        }
                        this.board[i][j] = col[i];
                    }
                }
                return moved;
            }

            isGameOver() {
                // 检查是否有空格
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 0) return false;
                    }
                }

                // 检查是否可以合并
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const current = this.board[i][j];
                        if (j < this.size - 1 && current === this.board[i][j + 1]) return false;
                        if (i < this.size - 1 && current === this.board[i + 1][j]) return false;
                    }
                }

                return true;
            }

            checkAllTimelinesEnded() {
                // 检查是否所有活跃的时间线都已结束
                const hasActiveTimeline = this.findActiveNodes(this.rootNode);

                if (!hasActiveTimeline && this.energy < this.energyCostPerTravel) {
                    this.showGameOver();
                }
            }

            findActiveNodes(node) {
                if (node.children.length === 0 && !node.isDeadEnd) {
                    return true;
                }

                for (const child of node.children) {
                    if (this.findActiveNodes(child)) {
                        return true;
                    }
                }

                return false;
            }

            showGameOver() {
                const bestScore = this.findBestScore(this.rootNode);
                const totalBranches = this.allNodes.length;

                document.getElementById('final-score').textContent = this.score;
                document.getElementById('final-best-score').textContent = bestScore;
                document.getElementById('final-steps').textContent = this.steps;
                document.getElementById('final-branches').textContent = totalBranches;

                document.getElementById('game-over-modal').classList.add('show');
            }

            findBestScore(node) {
                let maxScore = node.score;

                for (const child of node.children) {
                    const childMax = this.findBestScore(child);
                    if (childMax > maxScore) {
                        maxScore = childMax;
                    }
                }

                return maxScore;
            }

            travelToNode(node) {
                if (this.energy < this.energyCostPerTravel) {
                    alert('时间能量不足！需要合并更大的数字来恢复能量。');
                    return;
                }

                this.energy -= this.energyCostPerTravel;

                // 恢复到该节点的状态
                this.board = node.board.map(row => [...row]);
                this.score = node.score;
                this.steps = node.steps;
                this.currentNode = node;

                this.render();
                this.renderTimeline();
            }

            showTimeTravel() {
                // 这个功能在时间轴树中点击节点实现
                alert('请在右侧时间轴中点击要回到的时间节点');
            }

            render() {
                const boardElement = document.getElementById('game-board');
                boardElement.innerHTML = '';

                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        const value = this.board[i][j];

                        if (value > 0) {
                            tile.textContent = value;
                            tile.classList.add(`tile-${value > 2048 ? 'large' : value}`);
                        }

                        boardElement.appendChild(tile);
                    }
                }

                document.getElementById('current-score').textContent = this.score;
                document.getElementById('best-score').textContent = this.findBestScore(this.rootNode);
                document.getElementById('steps').textContent = this.steps;

                const energyPercent = (this.energy / this.maxEnergy) * 100;
                document.getElementById('energy-fill').style.width = energyPercent + '%';
                document.getElementById('energy-text').textContent = Math.floor(this.energy);

                // 更新时间回溯按钮状态
                const timeTravelBtn = document.getElementById('time-travel-btn');
                if (this.energy >= this.energyCostPerTravel && this.currentNode !== this.rootNode) {
                    timeTravelBtn.disabled = false;
                } else {
                    timeTravelBtn.disabled = true;
                }
            }

            renderTimeline() {
                const treeElement = document.getElementById('timeline-tree');
                treeElement.innerHTML = '';

                this.renderTimelineNode(this.rootNode, treeElement, 0);
            }

            renderTimelineNode(node, parentElement, depth) {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'timeline-node';

                if (node === this.currentNode) {
                    nodeDiv.classList.add('current');
                }

                if (node.isDeadEnd) {
                    nodeDiv.classList.add('dead-end');
                }

                const actionText = node.action ?
                    `→ ${node.action === 'up' ? '↑' : node.action === 'down' ? '↓' : node.action === 'left' ? '←' : '→'}` :
                    '起点';

                nodeDiv.innerHTML = `
                    <div class="node-info">
                        <span class="node-step">步骤 ${node.steps}</span>
                        <span class="node-score">分数: ${node.score}</span>
                    </div>
                    <div class="node-action">${actionText}${node.isDeadEnd ? ' (已结束)' : ''}</div>
                `;

                nodeDiv.onclick = (e) => {
                    e.stopPropagation();
                    if (node !== this.currentNode) {
                        this.travelToNode(node);
                    }
                };

                parentElement.appendChild(nodeDiv);

                if (node.children.length > 0) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'child-nodes';
                    nodeDiv.appendChild(childContainer);

                    for (const child of node.children) {
                        this.renderTimelineNode(child, childContainer, depth + 1);
                    }
                }
            }

            newGame() {
                document.getElementById('game-over-modal').classList.remove('show');
                this.init();
            }
        }

        // 初始化游戏
        const game = new TimeBranchSlider();

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const direction = e.key.replace('Arrow', '').toLowerCase();
                game.move(direction);
            }
        });

        // 触摸滑动控制（移动端支持）
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const gameBoard = document.getElementById('game-board');

        gameBoard.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        gameBoard.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const minSwipeDistance = 30; // 最小滑动距离

            // 判断是否是有效滑动
            if (Math.abs(diffX) < minSwipeDistance && Math.abs(diffY) < minSwipeDistance) {
                return;
            }

            // 判断滑动方向
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 水平滑动
                if (diffX > 0) {
                    game.move('right');
                } else {
                    game.move('left');
                }
            } else {
                // 垂直滑动
                if (diffY > 0) {
                    game.move('down');
                } else {
                    game.move('up');
                }
            }
        }
    </script>
</body>
</html>
