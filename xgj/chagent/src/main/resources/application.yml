spring:
  application:
    name: xzagent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Nacos 配置：使用原生 nacos-client 1.4.x，兼容 Nacos 1.3.x/1.4.x HTTP 协议
# 不依赖 Spring Cloud Alibaba，避免与 Spring Boot 3.5.x 版本兼容性问题
nacos:
  # Nacos 服务器地址，格式 host:port，多节点用逗号分隔
  server-addr: ${NACOS_SERVER_ADDR:https://nacos-test.xiaogj.com}
  # 命名空间 ID（非命名空间名称），为空则使用 public 空间
  namespace: ${NACOS_NAMESPACE:44294dcd-e6a9-445a-adda-a5377e50c336}
  # 分组，用于同一命名空间下的业务隔离
  group: ${NACOS_GROUP:DEFAULT_GROUP}
  # 是否开启服务注册；本地开发无需 Nacos 时设为 false
  register-enabled: ${NACOS_REGISTER_ENABLED:true}
  # 是否开启配置中心；从 Nacos 加载 ${spring.application.name}.yml
  config-enabled: ${NACOS_CONFIG_ENABLED:true}

xzagent:
  ui:
    # 前端 UI 的路径前缀。直连时为 /xzagent/ui，经 Zuul 网关透传时改为 /api/xzagent/ui
    path-prefix: ${XZAGENT_UI_PATH_PREFIX:/api/xzagent/ui}
  distributed-run:
    # 当前节点的稳定标识。未显式配置时，默认自动推导为 serviceName:ip:port。
    node-id: ${XZAGENT_NODE_ID:}
    # 当前节点对集群内其他节点暴露的内部基地址，用于 run cancel 等内部控制转发；
    # 未显式配置时默认自动推导为 http://ip:port。
    internal-base-url: ${XZAGENT_INTERNAL_BASE_URL:}
    # 活跃运行 lease 时长（秒）。owner 节点需要周期性 heartbeat 续租。
    active-lease-seconds: ${XZAGENT_ACTIVE_LEASE_SECONDS:120}
    # heartbeat 刷新间隔（秒）。建议明显小于 lease 时长。
    heartbeat-interval-seconds: ${XZAGENT_HEARTBEAT_INTERVAL_SECONDS:10}
    # Redis Stream 中运行事件的保留时长（秒），用于断线补流。
    event-stream-ttl-seconds: ${XZAGENT_EVENT_STREAM_TTL_SECONDS:3600}
    # 单次 replay 默认最多补发的事件条数，避免一次重连读出过大数据。
    replay-batch-size: ${XZAGENT_REPLAY_BATCH_SIZE:200}
    # live 事件轮询 Redis Stream 的阻塞时长（毫秒）。
    live-poll-timeout-millis: ${XZAGENT_LIVE_POLL_TIMEOUT_MILLIS:1000}
    # 内部控制端点路径前缀，供节点间 cancel 转发使用。
    internal-control-path-prefix: ${XZAGENT_INTERNAL_CONTROL_PATH_PREFIX:/xzagent/private/internal}

# 日志开关默认配置，可被 Nacos 覆盖
log:
  console:
    enable: true   # 默认开启控制台输出
  level: INFO      # 默认日志级别
