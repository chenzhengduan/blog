        // 公共数据生成器
        class 存活率数据生成器 {
            constructor(poolPrefix, fishName) {
                this.环境最优值 = { '溶氧': 6.0, '水温': 24.0, 'pH': 7.0, '氨氮': 0.1 };
                this.环境权重 = { '溶氧': 0.35, '水温': 0.30, 'pH': 0.20, '氨氮': 0.15 };
                this.死亡原因列表 = ['pH值异常', '疾病', '操作损伤', '天敌', '水质问题', '饲料问题'];
                this.负责人列表 = ['EMP001', 'EMP002', 'EMP003', 'EMP004', 'EMP005'];
                this.poolPrefix = (poolPrefix && typeof poolPrefix === 'string' ? poolPrefix.trim().toUpperCase() : 'QY') || 'QY';
                this.fishName = fishName || '青鱼';
                
                                 // 为9个养殖池生成固定的基础信息
                 this.养殖池信息 = {};
                 for (let i = 1; i <= 9; i++) {
                     const poolId = `${this.poolPrefix}${i.toString().padStart(2, '0')}`;
                     this.养殖池信息[poolId] = {
                         '投放时间': this.生成投放时间(),
                         '投放数量': this.生成投放数量(),
                         '养殖周期': Math.floor(Math.random() * (150 - 90 + 1)) + 90,
                         '负责人': this.负责人列表[Math.floor(Math.random() * this.负责人列表.length)]
                     };
                 }
            }
                         生成养殖池编号(index) {
                 const poolNum = (index % 9) + 1;
                 return `${this.poolPrefix}${poolNum.toString().padStart(2, '0')}`;
             }
            生成投放时间() {
                // 投放时间范围：2024年6月到2025年6月
                const startDate = new Date('2024-06-01');
                const endDate = new Date('2025-06-30');
                
                const daysBetween = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24));
                const randomDays = Math.floor(Math.random() * daysBetween);
                const randomDate = new Date(startDate.getTime() + randomDays * 24 * 60 * 60 * 1000);
                return randomDate.toISOString().split('T')[0];
            }
            生成投放数量() {
                // 根据养殖池大小生成合理的投放数量（整百取数）
                const 池子大小 = Math.random();
                let minCount, maxCount;
                
                if (池子大小 < 0.3) {
                    // 小池子：3000-5000尾
                    minCount = 3000;
                    maxCount = 5000;
                } else if (池子大小 < 0.7) {
                    // 中池子：5000-7000尾
                    minCount = 5000;
                    maxCount = 7000;
                } else {
                    // 大池子：7000-9000尾
                    minCount = 7000;
                    maxCount = 9000;
                }
                
                // 生成整百的随机数
                const 随机数 = Math.floor(Math.random() * (maxCount - minCount + 1)) + minCount;
                // 四舍五入到整百
                return Math.round(随机数 / 100) * 100;
            }
            生成基础存活率() {
                return Math.random() * (0.98 - 0.90) + 0.90; // 提高基础存活率下限到90%
            }
            生成存活数量(投放数量, 基础存活率) {
                // 存活数量也整百取数，更符合实际记录
                const 存活数量 = Math.floor(投放数量 * 基础存活率);
                return Math.round(存活数量 / 100) * 100;
            }
            生成环境参数() {
                // 根据季节调整水温（夏季偏高，冬季偏低）
                const 当前月份 = new Date().getMonth() + 1;
                let 水温均值 = 24.0;
                if (当前月份 >= 6 && 当前月份 <= 8) {
                    水温均值 = 26.0; // 夏季
                } else if (当前月份 >= 12 || 当前月份 <= 2) {
                    水温均值 = 18.0; // 冬季
                }
                
                return {
                    '水温': Math.max(16.0, Math.min(32.0, this.正态分布(水温均值, 1.5))),
                    '溶氧': Math.max(4.5, Math.min(8.5, this.正态分布(6.0, 0.8))),
                    'pH': Math.max(6.8, Math.min(8.2, this.正态分布(7.0, 0.3))),
                    '氨氮': Math.max(0.02, Math.min(0.25, this.正态分布(0.1, 0.05)))
                };
            }
            正态分布(均值, 标准差) {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                return 均值 + z * 标准差;
            }
            计算环境修正因子(环境参数) {
                let 修正因子 = 1.0;
                for (const [参数名, 实测值] of Object.entries(环境参数)) {
                    const 最优值 = this.环境最优值[参数名];
                    const 权重 = this.环境权重[参数名];
                    const 偏差 = Math.abs(实测值 - 最优值);
                    修正因子 -= 权重 * 偏差 * 0.05; // 进一步降低环境参数对存活率的影响
                }
                return Math.max(0.95, Math.min(1.0, 修正因子)); // 确保修正因子在0.95-1.0之间
            }
            生成单条数据(index, 指定投放时间 = null, 指定检测时间 = null) {
                const 养殖池编号 = this.生成养殖池编号(index);
                const 投放时间 = 指定投放时间 || this.生成投放时间();
                const 检测时间 = 指定检测时间 || 投放时间;
                const 投放数量 = this.生成投放数量();
                const 基础存活率 = this.生成基础存活率();
                const 环境参数 = this.生成环境参数();
                const 水温 = 环境参数['水温'];
                const 溶氧 = 环境参数['溶氧'];
                const pH = 环境参数['pH'];
                const 氨氮 = 环境参数['氨氮'];
                const 基础存活率百分比 = 基础存活率 * 100;
                const 环境修正因子 = this.计算环境修正因子(环境参数);
                let 综合存活率 = 基础存活率百分比 * 环境修正因子;
                // 确保综合存活率不低于90%
                综合存活率 = Math.max(90.0, 综合存活率);
                const 存活数量 = Math.floor(投放数量 * (综合存活率 / 100));
                // 根据环境参数智能判断死亡原因
                let 死亡原因;
                if (pH < 6.8 || pH > 7.8) {
                    死亡原因 = 'pH值异常';
                } else if (溶氧 < 5.0) {
                    死亡原因 = '缺氧';
                } else if (水温 < 18 || 水温 > 30) {
                    死亡原因 = '温度异常';
                } else if (氨氮 > 0.2) {
                    死亡原因 = '水质异常';
                } else if (Math.random() < 0.3) {
                    死亡原因 = '疾病';
                } else if (Math.random() < 0.2) {
                    死亡原因 = '寄生虫感染';
                } else if (Math.random() < 0.15) {
                    死亡原因 = '细菌感染';
                } else if (Math.random() < 0.1) {
                    死亡原因 = '操作损伤';
                } else if (Math.random() < 0.05) {
                    死亡原因 = '天敌';
                } else {
                    死亡原因 = '饲料问题';
                }
                // 根据投放时间计算合理的养殖周期
                const 投放月份 = new Date(投放时间).getMonth() + 1;
                let 养殖周期;
                
                if (投放月份 >= 3 && 投放月份 <= 5) {
                    // 春季投放：养殖周期较长 120-180天
                    养殖周期 = Math.floor(Math.random() * (180 - 120 + 1)) + 120;
                } else if (投放月份 >= 9 && 投放月份 <= 11) {
                    // 秋季投放：养殖周期中等 90-150天
                    养殖周期 = Math.floor(Math.random() * (150 - 90 + 1)) + 90;
                } else {
                    // 其他时间：养殖周期较短 60-120天
                    养殖周期 = Math.floor(Math.random() * (120 - 60 + 1)) + 60;
                }
                // 根据养殖池编号分配负责人（模拟实际工作分配）
                const 池子编号 = parseInt(养殖池编号.substring(2));
                const 负责人索引 = (池子编号 - 1) % this.负责人列表.length;
                const 负责人 = this.负责人列表[负责人索引];
                return {
                    '养殖池编号': 养殖池编号,
                    '鱼类': this.fishName,
                    '投放时间': 投放时间,
                    '检测时间': 检测时间,
                    '投放数量（尾）': 投放数量,
                    '存活数量（尾）': 存活数量,
                    '死亡原因': 死亡原因,
                    '养殖周期（天）': 养殖周期,
                    '负责人': 负责人,
                    '水温（℃）': Math.round(水温 * 10) / 10,
                    '溶氧（mg/L）': Math.round(溶氧 * 10) / 10,
                    'pH': Math.round(pH * 10) / 10,
                    '氨氮（mg/L）': Math.round(氨氮 * 100) / 100,
                    '基础存活率（%）': Math.round(基础存活率百分比 * 10) / 10,
                    '综合存活率（%）': Math.round(综合存活率 * 10) / 10
                };
            }
                         生成数据集(数据条数) {
                 const 数据列表 = [];
                 
                 // 计算需要多少周（每周9个鱼池）
                 const 周数 = Math.ceil(数据条数 / 9);
                 
                 // 生成每周的检测时间（从2024-06-01开始，每7天递增）
                 const 每周检测时间 = [];
                 const startDate = new Date('2024-06-01');
                 
                 for (let week = 0; week < 周数; week++) {
                     const 检测日期 = new Date(startDate);
                     检测日期.setDate(startDate.getDate() + (week * 7));
                     每周检测时间.push(检测日期.toISOString().split('T')[0]);
                 }
                 
                 // 生成数据：每周9个鱼塘，每个鱼塘每周只能投放一次
                 for (let week = 0; week < 周数; week++) {
                     const 检测时间 = 每周检测时间[week];
                     
                     // 本周的投放时间范围：检测时间往前推7-14天
                     const 投放天数偏移 = Math.floor(Math.random() * (14 - 7 + 1)) + 7;
                     const 投放日期 = new Date(检测时间);
                     投放日期.setDate(投放日期.getDate() - 投放天数偏移);
                     const 投放时间 = 投放日期.toISOString().split('T')[0];
                     
                     // 本周投放9个鱼塘
                     for (let poolIndex = 0; poolIndex < 9; poolIndex++) {
                         const 鱼池编号 = `${this.poolPrefix}${(poolIndex + 1).toString().padStart(2, '0')}`;
                         
                         // 生成单条数据
                         const 单条数据 = this.生成单条数据(poolIndex, 投放时间, 检测时间);
                         单条数据['养殖池编号'] = 鱼池编号;
                         
                         数据列表.push(单条数据);
                     }
                 }
                 
                 // 按优先级排序：1检测时间正序 > 2同一天内鱼池轮流 > 3投放时间正序
                 数据列表.sort((a, b) => {
                     // 1. 检测时间正序
                     if (a['检测时间'] !== b['检测时间']) {
                         return a['检测时间'].localeCompare(b['检测时间']);
                     }
                     
                     // 2. 同一天内鱼池轮流（QY01-QY09）
                     const 鱼池A = parseInt(a['养殖池编号'].substring(2));
                     const 鱼池B = parseInt(b['养殖池编号'].substring(2));
                     if (鱼池A !== 鱼池B) return 鱼池A - 鱼池B;
                     
                     // 3. 投放时间正序
                     return a['投放时间'].localeCompare(b['投放时间']);
                 });
                 
                 return 数据列表;
             }
        }

        function onFishTypeChange() {
            const fishType = document.getElementById('fishType').value;
            const config = fishConfig[fishType];
            document.getElementById('fileName').value = config.fileName;
            renderDescTable(fishType);
            renderPreviewHeader(fishType);
        }

        function renderDescTable(fishType) {
            const config = fishConfig[fishType];
            let html = '<table class="desc-table"><thead><tr><th>字段名称</th><th>说明</th></tr></thead><tbody>';
            for (const [name, desc] of config.desc) {
                html += `<tr><td>${name}</td><td>${desc}</td></tr>`;
            }
            html += '</tbody></table>';
            document.getElementById('descTableContainer').innerHTML = html;
        }

        function renderPreviewHeader(fishType) {
            const config = fishConfig[fishType];
            const headerRow = document.getElementById('previewHeader');
            headerRow.innerHTML = '';
            for (const h of config.headers) {
                const th = document.createElement('th');
                th.textContent = h;
                headerRow.appendChild(th);
            }
        }

        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = text;
        }
        function showSuccess() {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
        function showError() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
        }
        function updateStats(data) {
            const stats = {
                '总数据条数': data.length,
                '养殖池数量': new Set(data.map(d => d['养殖池编号'])).size,
                '员工编号数量': new Set(data.map(d => d['负责人'])).size,
                '死亡原因种类': new Set(data.map(d => d['死亡原因'])).size,
                '基础存活率平均值': (data.reduce((sum, d) => sum + d['基础存活率（%）'], 0) / data.length).toFixed(1) + '%',
                '综合存活率平均值': (data.reduce((sum, d) => sum + d['综合存活率（%）'], 0) / data.length).toFixed(1) + '%'
            };
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';
            for (const [label, value] of Object.entries(stats)) {
                const statItem = document.createElement('div');
                statItem.className = 'stat-item';
                statItem.innerHTML = `<div class="stat-label">${label}</div><div class="stat-value">${value}</div>`;
                statsGrid.appendChild(statItem);
            }
            document.getElementById('stats').style.display = 'block';
        }
        function updatePreview(data, fishType) {
            const previewBody = document.getElementById('previewBody');
            previewBody.innerHTML = '';
            const config = fishConfig[fishType];
            const previewData = data.slice(0, 5);
            for (const row of previewData) {
                const tr = document.createElement('tr');
                tr.innerHTML = config.headers.map(h => `<td>${row[h]}</td>`).join('');
                previewBody.appendChild(tr);
            }
            document.getElementById('preview').style.display = 'block';
        }
        function generateData() {
            const fishType = document.getElementById('fishType').value;
            const config = fishConfig[fishType];
            const dataCount = parseInt(document.getElementById('dataCount').value);
            const fileName = document.getElementById('fileName').value || config.fileName;
            const poolPrefix = document.getElementById('poolPrefix').value;
            if (dataCount < 1 || dataCount > 10000) {
                alert('请输入1-10000之间的数据条数');
                return;
            }
            document.getElementById('progress').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('preview').style.display = 'none';
            const generateBtn = document.querySelector('.generate-btn');
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 生成中...';
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress > 90) progress = 90;
                updateProgress(progress, `正在生成数据... ${Math.floor(progress)}%`);
            }, 100);
            setTimeout(() => {
                try {
                    updateProgress(95, '正在处理数据...');
                    const prefixInput = document.getElementById('poolPrefix')?.value || '';
                    const fishName = (fishConfig[fishType] && fishConfig[fishType].name) ? fishConfig[fishType].name : '青鱼';
                    const 生成器 = new 存活率数据生成器(prefixInput, fishName);
                    const data = 生成器.生成数据集(dataCount);
                    updateProgress(98, '正在生成Excel文件...');
                    const wb = XLSX.utils.book_new();
                    const orderedRows = data.map(row => {
                        const o = {};
                        for (const h of config.headers) {
                            o[h] = (row[h] !== undefined && row[h] !== null) ? row[h] : '';
                        }
                        return o;
                    });
                    const ws = XLSX.utils.json_to_sheet(orderedRows, { header: config.headers });
                    ws['!cols'] = config.headers.map(() => ({ wch: 12 }));
                    XLSX.utils.book_append_sheet(wb, ws, config.sheetName);
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${fileName}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    updateProgress(100, '生成完成！');
                    updateStats(data);
                    updatePreview(data, fishType);
                    showSuccess();
                } catch (error) {
                    console.error('生成失败:', error);
                    showError();
                } finally {
                    clearInterval(progressInterval);
                    generateBtn.disabled = false;
                    generateBtn.textContent = '🚀 生成数据';
                    setTimeout(() => {
                        document.getElementById('progress').style.display = 'none';
                    }, 2000);
                }
            }, 1000);
        }
        document.addEventListener('DOMContentLoaded', function() {
            onFishTypeChange();
        });
    </script>
